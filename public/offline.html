<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Battleshipz — Offline</title>
    <style>
      :root {
        --ocean: #020617;
        --ocean-light: #0f172a;
        --accent: #38bdf8;
        --text: #e2e8f0;
        --muted: #94a3b8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 0%, var(--ocean-light), var(--ocean));
        color: var(--text);
        font-family: ui-monospace, SFMono-Regular, 'Menlo', 'Monaco', 'Consolas', monospace;
        text-align: center;
        padding: 1.5rem;
      }
      .container {
        max-width: 28rem;
      }
      h1 { color: var(--accent); font-size: 2.25rem; margin: 0 0 0.5rem; }
      p { color: var(--muted); line-height: 1.5; margin: 0 0 1.5rem; }
      a {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        border: 1px solid rgba(56, 189, 248, 0.5);
        border-radius: 0.5rem;
        background: rgba(56, 189, 248, 0.1);
        color: #7dd3fc;
        text-decoration: none;
        font-weight: bold;
      }
      a:hover { background: rgba(56, 189, 248, 0.2); }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>You are offline</h1>
      <p>Battleshipz needs a connection to set sail. Check your network and try again.</p>
      <a href="/battleship/">Try again</a>
    </div>
  </body>
</html>
